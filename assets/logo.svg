<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="SceneKyaHai">
  <defs>
    <linearGradient id="rbGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#ff3333"/>
      <stop offset="100%" stop-color="#ff6666"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ───── LEFT FILM STRIP ───── -->
  <rect x="10"  y="20" width="70" height="460" fill="#050505" stroke="#ff3333" stroke-width="3"/>
  <g fill="#ff3333">
    <rect x="25" y="40"  width="40" height="35"/>
    <rect x="25" y="95"  width="40" height="35"/>
    <rect x="25" y="150" width="40" height="35"/>
    <rect x="25" y="205" width="40" height="35"/>
    <rect x="25" y="260" width="40" height="35"/>
    <rect x="25" y="315" width="40" height="35"/>
    <rect x="25" y="370" width="40" height="35"/>
    <rect x="25" y="425" width="40" height="35"/>
  </g>

  <!-- ───── RIGHT FILM STRIP ───── -->
  <rect x="820" y="20" width="70" height="460" fill="#050505" stroke="#0000ff" stroke-width="3"/>
  <g fill="#0000ff">
    <rect x="835" y="40"  width="40" height="35"/>
    <rect x="835" y="95"  width="40" height="35"/>
    <rect x="835" y="150" width="40" height="35"/>
    <rect x="835" y="205" width="40" height="35"/>
    <rect x="835" y="260" width="40" height="35"/>
    <rect x="835" y="315" width="40" height="35"/>
    <rect x="835" y="370" width="40" height="35"/>
    <rect x="835" y="425" width="40" height="35"/>
  </g>

  <!-- ───── WORDMARK ───── -->
  <g font-family="Impact, 'Arial Black', sans-serif" font-weight="900" text-anchor="middle" filter="url(#glow)">
    <text x="450" y="170" font-size="150" fill="url(#rbGrad)" letter-spacing="6">SCENE</text>
    <text x="450" y="310" font-size="150" fill="#f0f0f0"     letter-spacing="18">KYA</text>
    <text x="450" y="450" font-size="150" fill="#0000ff"     letter-spacing="8">HAI<tspan fill="#ff3333">?</tspan></text>
  </g>

  <!-- ───── SCAN LINE ACCENT ───── -->
  <line x1="90"  y1="210" x2="820" y2="210" stroke="#ff3333" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="90"  y1="350" x2="820" y2="350" stroke="#0000ff" stroke-width="1" stroke-opacity="0.35"/>

  <!-- ───── CORNER TICKS ───── -->
  <g stroke="#8892b0" stroke-width="2" fill="none">
    <path d="M 100 30 h 25 M 100 30 v 25"/>
    <path d="M 800 30 h -25 M 800 30 v 25"/>
    <path d="M 100 470 h 25 M 100 470 v -25"/>
    <path d="M 800 470 h -25 M 800 470 v -25"/>
  </g>
</svg>
