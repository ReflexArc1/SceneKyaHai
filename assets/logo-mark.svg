<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="SKH">
  <rect x="0" y="0" width="200" height="200" fill="#050505"/>
  <!-- film strip holes -->
  <g fill="#ff3333">
    <rect x="12" y="20" width="14" height="14"/>
    <rect x="12" y="50" width="14" height="14"/>
    <rect x="12" y="80" width="14" height="14"/>
    <rect x="12" y="110" width="14" height="14"/>
    <rect x="12" y="140" width="14" height="14"/>
    <rect x="12" y="170" width="14" height="14"/>
  </g>
  <g fill="#0000ff">
    <rect x="174" y="20" width="14" height="14"/>
    <rect x="174" y="50" width="14" height="14"/>
    <rect x="174" y="80" width="14" height="14"/>
    <rect x="174" y="110" width="14" height="14"/>
    <rect x="174" y="140" width="14" height="14"/>
    <rect x="174" y="170" width="14" height="14"/>
  </g>
  <!-- SKH monogram -->
  <text x="100" y="135" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif"
        font-size="130" font-weight="900" fill="#f0f0f0" letter-spacing="-6">SKH</text>
  <!-- play triangle accent -->
  <polygon points="85,55 85,75 105,65" fill="#ff3333"/>
</svg>
